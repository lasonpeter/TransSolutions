services:
  db:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: TransSolutionsDB
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d TransSolutionsDB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: TransSolutions/Dockerfile
    image: trans-solutions-app:latest
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy 
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=TransSolutionsDB;Username=admin;Password=password123
      - Jwt__Key=secret
      - Jwt__Issuer=https://trans-solutions.com
      - Jwt__Audience=https://trans-solutions.com
      - ASPNETCORE_ENVIRONMENT=Development